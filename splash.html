<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading</title>
  <style>
    :root {
      --splash-bg: #050505;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100vw;
      height: 100vh;
      margin: 0;
      background: var(--splash-bg);
      overflow: hidden;
    }

    body {
      position: relative;
    }

    .splash-video {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      object-position: center center;
      background: var(--splash-bg);
      transform: translateZ(0);
    }

    .splash-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0) 45%, rgba(0, 0, 0, 0.35) 100%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.24), rgba(0, 0, 0, 0.1) 35%, rgba(0, 0, 0, 0.28));
    }

    @media (max-width: 768px) {
      .splash-video {
        object-position: center top;
      }

      .splash-overlay {
        background:
          radial-gradient(circle at 50% 35%, rgba(0, 0, 0, 0) 40%, rgba(0, 0, 0, 0.42) 100%),
          linear-gradient(180deg, rgba(0, 0, 0, 0.32), rgba(0, 0, 0, 0.12) 45%, rgba(0, 0, 0, 0.35));
      }
    }
  </style>
</head>
<body>
  <video
    id="splashVideo"
    class="splash-video"
    autoplay
    muted
    playsinline
    preload="auto"
  >
    <source src="server/laptop_glow_remix.mp4" type="video/mp4">
  </video>
  <div class="splash-overlay" aria-hidden="true"></div>

  <script>
    const splashVideo = document.getElementById('splashVideo');
    let redirected = false;

    function goHome() {
      if (redirected) return;
      redirected = true;
      sessionStorage.setItem('splashPass', '1');
      window.location.replace('index.html');
    }

    // Keep splash duration aligned with your 5-second requirement.
    setTimeout(goHome, 5000);
    splashVideo.addEventListener('ended', goHome);

    // Mobile autoplay fallback.
    const tryPlay = () => {
      splashVideo.play().catch(() => {});
      document.removeEventListener('touchstart', tryPlay);
      document.removeEventListener('click', tryPlay);
    };
    document.addEventListener('touchstart', tryPlay, { passive: true });
    document.addEventListener('click', tryPlay);
  </script>
</body>
</html>
